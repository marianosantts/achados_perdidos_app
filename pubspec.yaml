name: achados_perdidos_app
description: "Aplicativo de Achados e Perdidos - Feature-First com Riverpod"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Gerência de estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Roteamento
  go_router: ^15.1.2

  # Cliente HTTP
  dio: ^5.8.0+1

  # Serialização / Freezed — versão 3.x compatível com riverpod_generator 2.6+
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^3.0.6
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.5
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
